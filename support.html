<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA | Support Hub</title>
    <style>
        :root { --sba-blue: #00274c; --sba-accent: #1e3a8a; --bg: #f1f5f9; }
        
        body { 
            background: var(--bg); 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            padding: 15px; 
            box-sizing: border-box;
        }

        .chat-box {
            width: 100%;
            max-width: 420px; 
            height: 85vh; 
            background: #ffffff;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .chat-header { 
            background: var(--sba-blue); 
            color: white; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .agent-info { display: flex; align-items: center; gap: 8px; }
        .online-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; border: 2px solid white; }

        #messageDisplay { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #f8fafc; 
        }

        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 13.5px; line-height: 1.4; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--sba-accent); color: white; border-bottom-right-radius: 2px; }
        .admin { align-self: flex-start; background: white; color: #334155; border: 1px solid #cbd5e1; border-bottom-left-radius: 2px; }

        .input-area { padding: 12px; background: white; border-top: 1px solid #edf2f7; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 20px; outline: none; font-size: 14px; }
        .send-btn { background: var(--sba-blue); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }

        .exit-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="chat-box">
        <div class="chat-header">
            <div class="agent-info">
                <div class="online-dot"></div>
                <div>
                    <div style="font-size: 13px; font-weight: bold;">SBA Agent Online</div>
                    <div style="font-size: 9px; opacity: 0.8;">Secure ID: #2026-X</div>
                </div>
            </div>
            <button class="exit-btn" onclick="location.href='dashboard.html'">CLOSE</button>
        </div>

        <div id="messageDisplay">
            <div class="bubble admin">Establishing secure connection...</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type message..." autocomplete="off">
            <button id="sendBtn" class="send-btn">➤</button>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>

    <script type="module">
        import { collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const display = document.getElementById('messageDisplay');
        const input = document.getElementById('userInput');
        let userName = "Applicant";

        onAuthStateChanged(window.auth, async (user) => {
            if (user) {
                // Fetch User Name for Admin's view
                const uSnap = await getDoc(doc(window.db, "users", user.uid));
                if(uSnap.exists()) userName = uSnap.data().fullName || "Applicant";

                // Listen for messages involving this user
                const q = query(
                    collection(window.db, "support_tickets"), 
                    where("userId", "==", user.uid),
                    orderBy("timestamp", "asc") // Sort by time automatically
                );

                onSnapshot(q, (snapshot) => {
                    display.innerHTML = `<div class="bubble admin">Welcome ${userName}. A disbursement officer is monitoring this secure line.</div>`;
                    
                    snapshot.forEach(doc => {
                        const m = doc.data();
                        const div = document.createElement('div');
                        div.className = `bubble ${m.sender === 'ADMIN' ? 'admin' : 'user'}`;
                        div.innerHTML = (m.sender === 'ADMIN' ? '<b>[AGENT]:</b> ' : '') + m.message;
                        display.appendChild(div);
                    });
                    display.scrollTop = display.scrollHeight;
                });
            } else { 
                window.location.href = 'index.html'; 
            }
        });

        const sendMessage = async () => {
            const msg = input.value.trim();
            if(!msg) return;
            
            const user = window.auth.currentUser;
            input.value = ""; 

            try {
                await addDoc(collection(window.db, "support_tickets"), {
                    userId: user.uid,
                    userName: userName,
                    message: msg,
                    sender: "USER",
                    timestamp: serverTimestamp()
                });
            } catch (err) { 
                console.error("Message failed:", err); 
            }
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
