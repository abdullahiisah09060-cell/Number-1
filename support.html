<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA Support Hub</title>
    <style>
        :root { --sba-blue: #00274c; --sba-red: #ba0c2f; --bg: #e5e7eb; }
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); margin: 0; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* Not full screen - centered card for mobile */
        .chat-card {
            width: 95%; max-width: 420px; height: 85vh; 
            background: white; border-radius: 15px; display: flex; 
            flex-direction: column; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 1px solid #cbd5e1;
        }

        .header { 
            background: var(--sba-blue); color: white; padding: 12px; 
            text-align: center; border-bottom: 3px solid var(--sba-red);
        }

        .welcome-box {
            background: #f1f5f9; border: 1px dashed #00274c; margin: 10px;
            padding: 10px; border-radius: 8px; font-size: 11px; color: #1e293b;
        }

        #messageDisplay { 
            flex: 1; overflow-y: auto; padding: 10px; display: flex; 
            flex-direction: column; gap: 10px; background: #f8fafc;
        }

        .bubble { 
            max-width: 85%; padding: 10px; border-radius: 10px; font-size: 14px; 
            line-height: 1.4; word-wrap: break-word;
        }
        
        .user { align-self: flex-end; background: var(--sba-blue); color: white; }
        .admin { align-self: flex-start; background: #f1f5f9; color: #000; border: 1px solid #ddd; }

        .tag { font-size: 9px; font-weight: bold; margin-bottom: 2px; display: block; opacity: 0.7; }

        .input-area { padding: 10px; background: white; border-top: 1px solid #eee; display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 16px; }
        .send-btn { background: var(--sba-blue); color: white; border: none; padding: 0 15px; border-radius: 20px; font-weight: bold; }
        
        .exit-btn { position: absolute; top: 10px; right: 10px; background: #000; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <button class="exit-btn" onclick="location.href='dashboard.html'">BACK</button>

    <div class="chat-card">
        <div class="header">
            <div style="font-size: 14px; font-weight: bold;">U.S. SBA SUPPORT</div>
            <div style="font-size: 9px;">OFFICIAL AGENT ONLINE</div>
        </div>

        <div id="messageDisplay">
            </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Message..." autocomplete="off">
            <button id="sendBtn" class="send-btn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const display = document.getElementById('messageDisplay');
        const input = document.getElementById('userInput');
        let userName = "Applicant";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uSnap = await getDoc(doc(db, "users", user.uid));
                if(uSnap.exists()) userName = uSnap.data().fullName || "Applicant";

                // We remove "orderBy" for now to make sure messages show up even without a database index
                const q = query(collection(db, "support_tickets"), where("userId", "==", user.uid));

                onSnapshot(q, (snapshot) => {
                    display.innerHTML = `
                        <div class="welcome-box">
                            <b>OFFICIAL SBA WELCOME PACKAGE</b><br>
                            Hello ${userName}, your secure chat is active. 
                            An officer has been assigned to your Case ID: ${user.uid.substring(0,6)}.
                        </div>
                    `;
                    
                    // Sort locally to ensure correct order without needing index
                    const msgs = [];
                    snapshot.forEach(d => msgs.push(d.data()));
                    msgs.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));

                    msgs.forEach(m => {
                        const div = document.createElement('div');
                        div.className = `bubble ${m.sender === 'ADMIN' ? 'admin' : 'user'}`;
                        const tag = m.sender === 'ADMIN' ? 'OFFICER' : 'YOU';
                        div.innerHTML = `<span class="tag">${tag}</span>${m.message}`;
                        display.appendChild(div);
                    });
                    
                    display.scrollTop = display.scrollHeight;
                });

            } else { window.location.href = 'index.html'; }
        });

        const sendMessage = async () => {
            const msg = input.value.trim();
            if(!msg || !auth.currentUser) return;
            const uid = auth.currentUser.uid;
            input.value = ""; 

            try {
                await addDoc(collection(db, "support_tickets"), {
                    userId: uid,
                    userName: userName,
                    message: msg,
                    sender: "USER",
                    timestamp: serverTimestamp()
                });
            } catch (err) { alert("Error sending message."); }
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
