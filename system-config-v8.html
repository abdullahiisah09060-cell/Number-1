<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA MASTER | V8.9 PRO</title>
    <style>
        :root { --admin-red: #ba0c2f; --admin-blue: #00274c; --bg: #0f172a; --accent: #38bdf8; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; font-size: 13px; overflow-x: hidden; }
        
        /* Navigation & Tabs */
        .admin-nav { background: #1e293b; padding: 10px; border-bottom: 2px solid var(--admin-red); text-align: center; position: sticky; top:0; z-index:100; }
        .tab-bar { display: flex; background: #1e293b; border-bottom: 1px solid #334155; position: sticky; top: 54px; z-index: 99; }
        .tab-item { flex: 1; padding: 12px; text-align: center; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; color: #94a3b8; transition: 0.3s; }
        .tab-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: rgba(56, 189, 248, 0.05); }

        .view-section { display: none; padding: 10px; max-width: 800px; margin: 0 auto; }
        .view-section.active { display: block; }

        /* Stats */
        .stats-wrapper { display: flex; gap: 8px; padding: 10px; }
        .stat-card { flex: 1; background: #334155; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-card p { margin: 5px 0 0; font-size: 16px; font-weight: bold; color: var(--accent); }

        /* Task Cards */
        .req-item { background: #fff; color: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 6px solid #f59e0b; }
        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .img-preview { width: 100%; height: 140px; object-fit: cover; border-radius: 6px; border: 1px solid #cbd5e1; cursor: pointer; }
        .info-bit { background: #f1f5f9; padding: 8px; border-radius: 4px; font-size: 11px; margin-top: 5px; border: 1px solid #e2e8f0; }

        /* User List */
        .user-card { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #334155; }
        .user-main { display: flex; justify-content: space-between; align-items: center; }
        .bal { color: #10b981; font-weight: bold; font-size: 15px; }

        /* Chat System */
        .chat-list-item { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #334155; }
        .chat-list-item:hover { border-color: var(--accent); }
        
        .full-chat-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
        .chat-header { background: #1e293b; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #334155; }
        .chat-history { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #0f172a; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 13px; line-height: 1.4; }
        .msg.admin { align-self: flex-end; background: var(--admin-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.user { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 2px; }
        .reply-box { padding: 15px; background: #1e293b; display: flex; gap: 10px; }
        .reply-box input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #334155; background: #0f172a; color: white; }

        .action-btn { padding: 10px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; flex: 1; }
        .btn-appr { background: #10b981; color: white; }
        .btn-rej { background: #64748b; color: white; }
    </style>
</head>
<body>

    <div class="admin-nav">
        <b style="font-size: 14px;">COMMAND V8.9 | MASTER PRO</b><br>
        <span id="adminEmail" style="font-size: 9px; color: var(--accent);">SYNCING...</span>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('tasks')">Tasks (<span id="count-tasks">0</span>)</div>
        <div class="tab-item" onclick="switchTab('users')">Clients</div>
        <div class="tab-item" onclick="switchTab('chats')">Messages</div>
    </div>

    <div id="section-tasks" class="view-section active">
        <div class="stats-wrapper">
            <div class="stat-card"><h3>Total Cash</h3><p id="stat-cash">$0</p></div>
            <div class="stat-card"><h3>Active Users</h3><p id="stat-users">0</p></div>
        </div>
        <div id="requestFeed"></div>
    </div>

    <div id="section-users" class="view-section">
        <div id="userList"></div>
    </div>

    <div id="section-chats" class="view-section">
        <div id="chatList"></div>
    </div>

    <div id="fullChat" class="full-chat-view">
        <div class="chat-header">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:20px;">←</button>
            <b id="activeChatName">User Name</b>
        </div>
        <div class="chat-history" id="chatBox"></div>
        <div class="reply-box">
            <input type="text" id="replyInput" placeholder="Write message...">
            <button onclick="sendReply()" class="action-btn btn-appr" style="flex:0; padding:0 20px;">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUID = null;
        let activeName = null;

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "liger4683@gmail.com") {
                document.getElementById('adminEmail').innerText = "ADMIN: " + user.email;
                initApp();
            } else { window.location.href = "index.html"; }
        });

        function initApp() {
            // USERS SYNC
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('userList');
                let totalCash = 0; list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    const bal = parseFloat(u.balance) || 0;
                    totalCash += bal;
                    list.innerHTML += `<div class="user-card">
                        <div class="user-main" onclick="this.parentElement.classList.toggle('active')">
                            <div><b>${u.fullName || 'User'}</b><div class="bal">$${bal.toLocaleString()}</div></div>
                            <button class="math-btn" onclick="window.doMath('${d.id}')">±</button>
                        </div>
                    </div>`;
                });
                document.getElementById('stat-users').innerText = snap.size;
                document.getElementById('stat-cash').innerText = "$" + totalCash.toLocaleString();
            });

            // TASKS SYNC (Including Front/Back Images & Details)
            onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snap) => {
                const feed = document.getElementById('requestFeed');
                let count = 0; feed.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    if(r.status !== "PENDING") return;
                    count++;
                    feed.innerHTML += `<div class="req-item">
                        <small>${r.userName || r.userEmail}</small>
                        <div style="font-weight:900; font-size:14px; margin-bottom:5px;">${r.type}</div>
                        <h2 style="margin:0 0 10px 0;">$${parseFloat(r.amount || 0).toLocaleString()}</h2>
                        
                        <div class="info-bit"><b>Details:</b> ${r.details || r.note || 'No specific info'}</div>
                        
                        <div class="kyc-grid">
                            ${r.frontImg ? `<img src="${r.frontImg}" class="img-preview" onclick="window.open(this.src)">` : ''}
                            ${r.backImg ? `<img src="${r.backImg}" class="img-preview" onclick="window.open(this.src)">` : ''}
                        </div>

                        <div style="display:flex; gap:8px;">
                            <button onclick="window.processTask('${d.id}', '${r.userId}', 'APPROVE', '${r.type}', '${r.amount || 0}')" class="action-btn btn-appr">APPROVE</button>
                            <button onclick="window.processTask('${d.id}', '${r.userId}', 'REJECT', '${r.type}', '${r.amount || 0}')" class="action-btn btn-rej">REJECT</button>
                        </div>
                    </div>`;
                });
                document.getElementById('count-tasks').innerText = count;
            });

            // CHAT LIST SYNC
            onSnapshot(query(collection(db, "support_tickets"), orderBy("timestamp", "asc")), (snap) => {
                const chatList = document.getElementById('chatList');
                const groups = {};
                snap.forEach(sDoc => {
                    const m = sDoc.data();
                    const uid = m.userId || "unknown";
                    if (!groups[uid]) groups[uid] = { name: m.userName || "User", lastMsg: m.message, msgs: [] };
                    groups[uid].msgs.push(m);
                    groups[uid].lastMsg = m.message;
                });

                chatList.innerHTML = "";
                Object.keys(groups).forEach(uid => {
                    const g = groups[uid];
                    const item = document.createElement('div');
                    item.className = 'chat-list-item';
                    item.innerHTML = `<div><b>${g.name}</b><br><small style="color:#94a3b8">${g.lastMsg.substring(0, 30)}...</small></div><span>→</span>`;
                    item.onclick = () => openChat(uid, g.name, g.msgs);
                    chatList.appendChild(item);
                    
                    // Update active chat if open
                    if (activeUID === uid) renderMessages(g.msgs);
                });
            });
        }

        // NAVIGATION LOGIC
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-item, .view-section').forEach(el => el.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`section-${tab}`).classList.add('active');
        };

        window.openChat = (uid, name, msgs) => {
            activeUID = uid;
            activeName = name;
            document.getElementById('activeChatName').innerText = name;
            document.getElementById('fullChat').style.display = 'flex';
            renderMessages(msgs);
        };

        window.closeChat = () => {
            activeUID = null;
            document.getElementById('fullChat').style.display = 'none';
        };

        function renderMessages(msgs) {
            const box = document.getElementById('chatBox');
            box.innerHTML = msgs.map(m => `<div class="msg ${m.sender === 'ADMIN' ? 'admin' : 'user'}">${m.message}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        window.sendReply = async () => {
            const input = document.getElementById('replyInput');
            if(!input.value || !activeUID) return;
            await addDoc(collection(db, "support_tickets"), {
                userId: activeUID, userName: activeName, message: input.value, sender: "ADMIN", timestamp: serverTimestamp()
            });
            input.value = "";
        };

        window.doMath = async (uid) => {
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);
            const currentBal = parseFloat(userSnap.data().balance) || 0;
            const val = prompt(`Edit Balance for ${userSnap.data().fullName}\nCurrent: $${currentBal}`, "0");
            if(val !== null) await updateDoc(userRef, { balance: currentBal + parseFloat(val) });
        };

        window.processTask = async (docId, uid, action, type, amt) => {
            const uRef = doc(db, "users", uid);
            const rRef = doc(db, "requests", docId);
            const uSnap = await getDoc(uRef);
            const currentBal = parseFloat(uSnap.data().balance || 0);
            const taskAmt = parseFloat(amt || 0);

            if (action === 'APPROVE') {
                if (type.includes("GRANT")) await updateDoc(uRef, { balance: currentBal + taskAmt });
                if (type.includes("KYC")) await updateDoc(uRef, { kycStatus: "APPROVED" });
                await updateDoc(rRef, { status: "SUCCESSFUL" });
            } else {
                if (type.includes("WITHDRAW") || type.includes("TRANSFER")) await updateDoc(uRef, { balance: currentBal + taskAmt });
                await updateDoc(rRef, { status: "DECLINED" });
            }
            alert("Done!");
        };
    </script>
</body>
</html>
