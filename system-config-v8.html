<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA Admin | Global Control v8</title>
    <style>
        :root { --admin-dark: #0f172a; --sba-blue: #00274c; --accent: #3b82f6; }
        body { background: #f8fafc; margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--admin-dark); color: white; padding: 20px; flex-shrink: 0; }
        .nav-item { padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .active { background: var(--accent) !important; font-weight: bold; }

        /* Main Content */
        .main { flex-grow: 1; overflow-y: auto; padding: 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-top: 4px solid var(--accent); }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--admin-dark); }

        /* Tables & Lists */
        .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .data-table th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; color: #64748b; }
        .data-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #dcfce7; color: #166534; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: var(--accent); animation: load 2s infinite; display: none; }
        @keyframes load { 0% { width: 0; } 100% { width: 100%; } }
    </style>
</head>
<body>

    <div id="loading"></div>

    <div class="sidebar">
        <h2 style="color:var(--accent)">SBA ADMIN</h2>
        <div class="nav-item active" onclick="showTab('users')">👥 All Users (<span id="userCount">0</span>)</div>
        <div class="nav-item" onclick="showTab('requests')">💸 Transactions</div>
        <div class="nav-item" onclick="showTab('chat')">💬 Live Chat Support</div>
    </div>

    <div class="main">
        <div class="header">
            <h1>System Dashboard</h1>
            <div id="adminEmail" style="font-size: 12px; color: #64748b;"></div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div style="font-size:12px; color:#64748b">TOTAL AUTH USERS</div>
                <div class="stat-val" id="totalUsers">--</div>
            </div>
            <div class="stat-card">
                <div style="font-size:12px; color:#64748b">PENDING TRANS.</div>
                <div class="stat-val" id="pendingTrans">--</div>
            </div>
        </div>

        <div id="usersTab">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>User / Email</th>
                        <th>Balance</th>
                        <th>KYC Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
        </div>

        <div id="requestsTab" style="display:none">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Manage</th>
                    </tr>
                </thead>
                <tbody id="transList"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('adminEmail').innerText = "Logged in: " + user.email;
            
            loadUsers();
            loadTransactions();
        });

        // 1. Load All Users in Real-time
        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('userList');
                list.innerHTML = "";
                document.getElementById('userCount').innerText = snap.size;
                document.getElementById('totalUsers').innerText = snap.size;

                snap.forEach(doc => {
                    const u = doc.data();
                    list.innerHTML += `
                        <tr>
                            <td><b>${u.fullName || 'No Name'}</b><br><small>${u.email || 'N/A'}</small></td>
                            <td>$${(u.balance || 0).toLocaleString()}</td>
                            <td><span class="status-pill ${u.kycStatus === 'APPROVED' ? 'approved' : 'pending'}">${u.kycStatus || 'NOT STARTED'}</span></td>
                            <td><button onclick="window.manageUser('${doc.id}')" style="cursor:pointer">Edit</button></td>
                        </tr>
                    `;
                });
            });
        }

        // 2. Load Transactions / Requests
        function loadTransactions() {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('transList');
                list.innerHTML = "";
                let pendingCount = 0;

                snap.forEach(doc => {
                    const t = doc.data();
                    if(t.status === "PENDING") pendingCount++;
                    
                    list.innerHTML += `
                        <tr>
                            <td>${t.timestamp ? t.timestamp.toDate().toLocaleDateString() : 'Just now'}</td>
                            <td>${t.type}</td>
                            <td>$${parseFloat(t.amount).toLocaleString()}</td>
                            <td><span class="status-pill ${t.status.toLowerCase()}">${t.status}</span></td>
                            <td>
                                <button onclick="window.updateStatus('requests', '${doc.id}', 'APPROVED')" style="color:green">✔</button>
                                <button onclick="window.updateStatus('requests', '${doc.id}', 'REJECTED')" style="color:red">✖</button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('pendingTrans').innerText = pendingCount;
            });
        }

        // Global Action Functions
        window.updateStatus = async (col, id, newStatus) => {
            const ref = doc(db, col, id);
            await updateDoc(ref, { status: newStatus });
            alert("Status Updated to " + newStatus);
        };

        window.showTab = (tab) => {
            document.getElementById('usersTab').style.display = tab === 'users' ? 'block' : 'none';
            document.getElementById('requestsTab').style.display = tab === 'requests' ? 'block' : 'none';
        };
    </script>
</body>
</html>
