<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA MASTER | V8.11 SPEED</title>
    <style>
        :root { --admin-red: #ff3b30; --admin-blue: #007aff; --bg: #0f172a; --accent: #38bdf8; }
        body { background: var(--bg); color: #f8fafc; font-family: -apple-system, sans-serif; margin: 0; font-size: 13px; }
        
        /* Fast Header */
        .sticky-header { position: sticky; top: 0; z-index: 100; background: #1e293b; border-bottom: 2px solid var(--admin-red); }
        .tab-bar { display: flex; border-top: 1px solid #334155; }
        .tab-item { flex: 1; padding: 14px; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; color: #94a3b8; position: relative; }
        .tab-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        /* Red Notification Badge */
        .nav-badge { position: absolute; top: 5px; right: 15%; background: var(--admin-red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; display: none; font-weight: 900; box-shadow: 0 0 10px rgba(255,0,0,0.5); }

        .view-section { display: none; padding: 10px; max-width: 600px; margin: 0 auto; }
        .view-section.active { display: block; }

        /* Search Bar */
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; box-sizing: border-box; }

        /* Task Cards */
        .req-item { background: #fff; color: #1e293b; padding: 12px; border-radius: 10px; margin-bottom: 12px; border-left: 5px solid #f59e0b; }
        .kyc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .img-thumb { width: 100%; height: 110px; object-fit: cover; border-radius: 5px; border: 1px solid #ccc; }

        /* Chat List & Alerts */
        .chat-row { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; cursor: pointer; }
        .need-reply { border-left: 4px solid var(--admin-red); background: rgba(255, 59, 48, 0.05); }
        .reply-tag { background: var(--admin-red); color: white; font-size: 8px; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

        /* Full Screen Chat */
        .chat-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; }
        .msg.admin { align-self: flex-end; background: var(--admin-blue); color: white; }
        .msg.user { align-self: flex-start; background: #334155; color: white; }

        .btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .btn-green { background: #10b981; color: white; }
        .btn-gray { background: #64748b; color: white; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div style="padding: 10px; text-align: center;">
            <b style="font-size: 14px;">COMMAND V8.11 MASTER</b>
        </div>
        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab('tasks')">TASKS</div>
            <div class="tab-item" onclick="switchTab('users')">CLIENTS</div>
            <div class="tab-item" onclick="switchTab('chats')">CHATS <span id="chatBadge" class="nav-badge">0</span></div>
        </div>
    </div>

    <div id="section-tasks" class="view-section active">
        <div id="requestFeed"></div>
    </div>

    <div id="section-users" class="view-section">
        <input type="text" id="userSearch" class="search-box" placeholder="Search by name..." onkeyup="doSearch()">
        <div id="userList"></div>
    </div>

    <div id="section-chats" class="view-section">
        <div id="chatList"></div>
    </div>

    <div id="chatOverlay" class="chat-overlay">
        <div style="background:#1e293b; padding:15px; display:flex; justify-content: space-between; border-bottom:1px solid #334155;">
            <b id="activeChatUser">User</b>
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:20px;">✕</button>
        </div>
        <div class="chat-body" id="chatStream"></div>
        <div style="padding:15px; display:flex; gap:10px; background:#1e293b;">
            <input type="text" id="chatInput" style="flex:1; padding:12px; border-radius:20px; border:none; background:#0f172a; color:white;" placeholder="Type reply...">
            <button onclick="sendReply()" class="btn btn-green">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUID = null;
        let activeName = null;
        let allUsers = [];

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "liger4683@gmail.com") { initApp(); } 
            else { window.location.href = "index.html"; }
        });

        function initApp() {
            // Speed Tip: Snapshot listeners update instantly when data changes
            onSnapshot(collection(db, "users"), (snap) => {
                allUsers = [];
                const list = document.getElementById('userList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data(); u.id = d.id;
                    allUsers.push(u);
                    renderUserCard(u, list);
                });
            });

            onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snap) => {
                const feed = document.getElementById('requestFeed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    if(r.status !== "PENDING") return;
                    feed.innerHTML += `<div class="req-item">
                        <small>${r.userName || r.userEmail}</small>
                        <div style="font-weight:bold; color:#1e293b;">${r.type}</div>
                        <h2 style="margin:5px 0;">$${parseFloat(r.amount).toLocaleString()}</h2>
                        <div style="font-size:11px; margin-bottom:8px; color:#64748b;">${r.details || r.note || ''}</div>
                        <div class="kyc-row">
                            ${r.frontImg ? `<img src="${r.frontImg}" class="img-thumb" onclick="window.open(this.src)">` : ''}
                            ${r.backImg ? `<img src="${r.backImg}" class="img-thumb" onclick="window.open(this.src)">` : ''}
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button onclick="window.processTask('${d.id}', '${r.userId}', 'APPROVE', '${r.type}', ${r.amount})" class="btn btn-green" style="flex:1">APPROVE</button>
                            <button onclick="window.processTask('${d.id}', '${r.userId}', 'REJECT', '${r.type}', ${r.amount})" class="btn btn-gray" style="flex:1">REJECT</button>
                        </div>
                    </div>`;
                });
            });

            onSnapshot(query(collection(db, "support_tickets"), orderBy("timestamp", "asc")), (snap) => {
                const groups = {};
                snap.forEach(s => {
                    const m = s.data();
                    const uid = m.userId;
                    if(!groups[uid]) groups[uid] = { name: m.userName, msgs: [] };
                    groups[uid].msgs.push(m);
                });

                const chatList = document.getElementById('chatList');
                const badge = document.getElementById('chatBadge');
                chatList.innerHTML = "";
                let unrepliedCount = 0;

                Object.keys(groups).forEach(uid => {
                    const g = groups[uid];
                    const lastMsg = g.msgs[g.msgs.length - 1];
                    const isUnreplied = lastMsg.sender !== "ADMIN";
                    if(isUnreplied) unrepliedCount++;

                    const div = document.createElement('div');
                    div.className = `chat-row ${isUnreplied ? 'need-reply' : ''}`;
                    div.innerHTML = `<div><b>${g.name}</b><br><small>${lastMsg.message.substring(0,25)}...</small></div>
                                     ${isUnreplied ? '<span class="reply-tag">REPLY NEEDED</span>' : '<span>→</span>'}`;
                    div.onclick = () => openChat(uid, g.name, g.msgs);
                    chatList.appendChild(div);

                    if(activeUID === uid) renderMessages(g.msgs);
                });

                badge.innerText = unrepliedCount;
                badge.style.display = unrepliedCount > 0 ? "block" : "none";
            });
        }

        function renderUserCard(u, container) {
            container.innerHTML += `<div class="chat-row">
                <div><b>${u.fullName}</b><br><small style="color:#10b981">$${parseFloat(u.balance || 0).toLocaleString()}</small></div>
                <button onclick="window.doMath('${u.id}')" style="background:var(--accent); border:none; padding:5px 10px; border-radius:4px; color:white;">±</button>
            </div>`;
        }

        window.doSearch = () => {
            const val = document.getElementById('userSearch').value.toLowerCase();
            const list = document.getElementById('userList');
            list.innerHTML = "";
            allUsers.filter(u => u.fullName.toLowerCase().includes(val)).forEach(u => renderUserCard(u, list));
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-item, .view-section').forEach(el => el.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`section-${tab}`).classList.add('active');
        };

        function openChat(uid, name, msgs) {
            activeUID = uid; activeName = name;
            document.getElementById('activeChatUser').innerText = name;
            document.getElementById('chatOverlay').style.display = "flex";
            renderMessages(msgs);
        }

        window.closeChat = () => { activeUID = null; document.getElementById('chatOverlay').style.display = "none"; };

        function renderMessages(msgs) {
            const box = document.getElementById('chatStream');
            box.innerHTML = msgs.map(m => `<div class="msg ${m.sender==='ADMIN'?'admin':'user'}">${m.message}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        window.sendReply = async () => {
            const input = document.getElementById('chatInput');
            if(!input.value || !activeUID) return;
            await addDoc(collection(db, "support_tickets"), {
                userId: activeUID, userName: activeName, message: input.value, sender: "ADMIN", timestamp: serverTimestamp()
            });
            input.value = "";
        };

        window.processTask = async (did, uid, action, type, amt) => {
            const uRef = doc(db, "users", uid);
            const rRef = doc(db, "requests", did);
            const uSnap = await getDoc(uRef);
            const curBal = parseFloat(uSnap.data().balance || 0);

            if(action === 'APPROVE') {
                if(type.includes("GRANT")) await updateDoc(uRef, { balance: curBal + amt });
                if(type.includes("KYC")) await updateDoc(uRef, { kycStatus: "APPROVED" });
                await updateDoc(rRef, { status: "SUCCESSFUL" });
            } else {
                if(type.includes("WITHDRAW") || type.includes("TRANSFER")) await updateDoc(uRef, { balance: curBal + amt });
                await updateDoc(rRef, { status: "DECLINED" });
            }
            alert("Updated!");
        };

        window.doMath = async (uid) => {
            const val = prompt("Enter amount to add (use - to subtract):", "0");
            if(val) {
                const uRef = doc(db, "users", uid);
                const uSnap = await getDoc(uRef);
                const cur = parseFloat(uSnap.data().balance || 0);
                await updateDoc(uRef, { balance: cur + parseFloat(val) });
            }
        };
    </script>
</body>
</html>
