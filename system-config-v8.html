<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA MASTER | V8.2 COMMAND</title>
    <style>
        :root { --admin-red: #ba0c2f; --admin-blue: #00274c; --bg: #0f172a; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; font-size: 13px; padding-bottom: 50px; }
        .admin-nav { background: #1e293b; padding: 15px; border-bottom: 2px solid var(--admin-red); text-align: center; position: sticky; top:0; z-index:100; }
        .stats-wrapper { display: flex; gap: 8px; padding: 10px; overflow-x: auto; }
        .stat-card { flex: 1; background: #334155; padding: 12px; border-radius: 8px; text-align: center; min-width: 100px; border: 1px solid #475569; }
        .stat-card h3 { font-size: 10px; margin: 0; color: #94a3b8; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: #38bdf8; }
        .container { padding: 10px; max-width: 600px; margin: 0 auto; }
        .section-title { font-size: 11px; color: #38bdf8; text-transform: uppercase; margin: 20px 0 10px; font-weight: bold; border-left: 3px solid #38bdf8; padding-left: 8px; }
        .user-card { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #334155; }
        .user-main { display: flex; justify-content: space-between; align-items: center; }
        .bal { color: #10b981; font-weight: bold; font-size: 16px; }
        .math-btn { background: #38bdf8; color: #0f172a; border: none; width: 40px; height: 40px; border-radius: 8px; font-size: 20px; font-weight: 900; }
        .req-item { background: #fff; color: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 6px solid #f59e0b; }
        .img-preview { width: 100%; height: 180px; object-fit: contain; background: #000; border-radius: 6px; margin: 10px 0; border: 1px solid #ddd; }
        .action-btn { padding: 14px; border-radius: 8px; font-size: 12px; font-weight: 800; border: none; flex: 1; text-transform: uppercase; }
        .btn-appr { background: #10b981; color: white; }
        .btn-rej { background: #ef4444; color: white; }
        .chat-card { background: #fff; color: #1e293b; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .chat-history { height: 250px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background: #f1f5f9; }
        .msg { max-width: 85%; padding: 10px; border-radius: 12px; font-size: 13px; line-height: 1.4; }
        .msg.admin { align-self: flex-end; background: var(--admin-blue); color: white; }
        .msg.user { align-self: flex-start; background: #e2e8f0; color: #1e293b; }
        .reply-box { padding: 10px; display: flex; gap: 8px; background: #fff; border-top: 1px solid #ddd; }
        .reply-box input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="admin-nav">
        <b>SBA COMMAND V8.2</b><br>
        <span id="adminEmail" style="font-size: 10px; color: #38bdf8;">AUTHENTICATING...</span>
    </div>

    <div class="stats-wrapper">
        <div class="stat-card"><h3>Clients</h3><p id="stat-users">0</p></div>
        <div class="stat-card"><h3>Tasks</h3><p id="stat-reqs">0</p></div>
        <div class="stat-card"><h3>Vault</h3><p id="stat-cash">$0</p></div>
    </div>

    <div class="container">
        <div class="section-title">👤 ALL CLIENTS</div>
        <div id="userList"></div>

        <div class="section-title">⚡ ACTION REQUIRED</div>
        <div id="requestFeed"></div>

        <div class="section-title">💬 LIVE SUPPORT</div>
        <div id="chatFeed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, doc, updateDoc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "liger4683@gmail.com") {
                document.getElementById('adminEmail').innerText = "ADMIN: " + user.email.toUpperCase();
                startListeners();
            } else { window.location.href = "index.html"; }
        });

        function startListeners() {
            // 1. Clients List
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('userList');
                let total = 0; list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    let b = parseFloat(u.balance) || 0; total += b;
                    list.innerHTML += `
                        <div class="user-card">
                            <div class="user-main">
                                <div><b>${u.fullName || u.email}</b><div class="bal">$${b.toLocaleString()}</div></div>
                                <button class="math-btn" onclick="window.doMath('${d.id}')">±</button>
                            </div>
                        </div>`;
                });
                document.getElementById('stat-users').innerText = snap.size;
                document.getElementById('stat-cash').innerText = "$" + total.toLocaleString();
            });

            // 2. Tasks Feed (Simple Query for instant loading)
            onSnapshot(collection(db, "requests"), (snap) => {
                const feed = document.getElementById('requestFeed');
                let count = 0; feed.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    if(r.status !== "PENDING") return;
                    count++;
                    const isKyc = r.type?.includes("KYC");
                    feed.innerHTML += `
                        <div class="req-item">
                            <small>${r.userEmail || 'User'}</small>
                            <div style="font-weight:bold; color:#00274c;">${r.type}</div>
                            <h2>$${parseFloat(r.amount || 0).toLocaleString()}</h2>
                            ${isKyc ? `<img src="${r.frontImg}" class="img-preview">` : ''}
                            <div style="display:flex; gap:8px; margin-top:10px;">
                                <button onclick="window.processTask('${d.id}', '${r.userId}', 'APPROVE', '${r.type}', ${r.amount})" class="action-btn btn-appr">Approve</button>
                                <button onclick="window.processTask('${d.id}', '${r.userId}', 'REJECT', '${r.type}', ${r.amount})" class="action-btn btn-rej">Decline</button>
                            </div>
                        </div>`;
                });
                document.getElementById('stat-reqs').innerText = count;
                if(count === 0) feed.innerHTML = "<p style='text-align:center;color:#64748b'>All clear.</p>";
            });
        }

        window.doMath = async (uid) => {
            const val = prompt("Enter amount to adjust (+ to add, - to subtract):");
            if(val) {
                const ref = doc(db, "users", uid);
                const s = await getDoc(ref);
                const newBal = (parseFloat(s.data().balance || 0) + parseFloat(val)).toFixed(2);
                await updateDoc(ref, { balance: parseFloat(newBal) });
            }
        };

        window.processTask = async (id, uid, act, type, amt) => {
            const rRef = doc(db, "requests", id);
            const uRef = doc(db, "users", uid);
            if(act === 'APPROVE') {
                await updateDoc(rRef, { status: "SUCCESSFUL" });
                if(type.includes("KYC")) await updateDoc(uRef, { kycStatus: "APPROVED" });
                alert("Approved!");
            } else {
                await updateDoc(rRef, { status: "REJECTED" });
                if(type.includes("WIRE")) {
                    const s = await getDoc(uRef);
                    const refund = (parseFloat(s.data().balance || 0) + parseFloat(amt)).toFixed(2);
                    await updateDoc(uRef, { balance: parseFloat(refund) });
                }
                alert("Rejected & Refunded.");
            }
        };
    </script>
</body>
</html>
