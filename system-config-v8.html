<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA MASTER | V8.6 FINAL</title>
    <style>
        :root { --admin-red: #ba0c2f; --admin-blue: #00274c; --bg: #0f172a; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; font-size: 13px; padding-bottom: 50px; }
        .admin-nav { background: #1e293b; padding: 12px; border-bottom: 2px solid var(--admin-red); text-align: center; position: sticky; top:0; z-index:100; }
        .stats-wrapper { display: flex; gap: 8px; padding: 10px; background: var(--bg); }
        .stat-card { flex: 1; background: #334155; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #475569; }
        .stat-card p { margin: 4px 0 0; font-size: 16px; font-weight: bold; color: #38bdf8; }
        .container { padding: 8px; max-width: 600px; margin: 0 auto; }
        .section-title { font-size: 11px; color: #38bdf8; text-transform: uppercase; margin: 20px 0 10px; font-weight: bold; border-left: 3px solid #38bdf8; padding-left: 8px; }
        .user-card { background: #1e293b; padding: 12px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 8px; }
        .chat-card { background: #fff; color: #1e293b; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .chat-history { height: 250px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #f1f5f9; }
        .msg { max-width: 85%; padding: 8px; border-radius: 10px; font-size: 12px; }
        .msg.admin { align-self: flex-end; background: var(--admin-blue); color: white; }
        .msg.user { align-self: flex-start; background: #cbd5e1; }
        .reply-box { padding: 10px; display: flex; gap: 8px; background: #fff; border-top: 1px solid #ddd; }
        .reply-box input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="admin-nav">
        <b>SBA COMMAND PRO V8.6</b><br>
        <span id="adminEmail" style="font-size: 10px; color: #38bdf8;">SYNCING DATA...</span>
    </div>

    <div class="stats-wrapper">
        <div class="stat-card"><h3>DB Clients</h3><p id="stat-users">0</p></div>
        <div class="stat-card"><h3>Pending</h3><p id="stat-reqs">0</p></div>
    </div>

    <div class="container">
        <div class="section-title">💬 ALL SUPPORT HISTORY</div>
        <div id="chatFeed"></div>

        <div class="section-title">👤 REGISTERED IN DATABASE</div>
        <div id="userList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "liger4683@gmail.com") {
                document.getElementById('adminEmail').innerText = "ADMIN: " + user.email.toUpperCase();
                runAdminPortal();
            } else { window.location.href = "index.html"; }
        });

        function runAdminPortal() {
            // Load Users
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('userList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    list.innerHTML += `<div class="user-card"><b>${u.fullName || u.email}</b><br><small>${d.id}</small></div>`;
                });
                document.getElementById('stat-users').innerText = snap.size;
            });

            // Load All Chat History (Old + New)
            onSnapshot(query(collection(db, "support_tickets"), orderBy("timestamp", "asc")), (snap) => {
                const chatFeed = document.getElementById('chatFeed');
                const groups = {};
                
                snap.forEach(doc => {
                    const m = doc.data();
                    const uid = m.userId || "unknown";
                    if (!groups[uid]) groups[uid] = { name: m.userName || m.userEmail || "Legacy Chat", msgs: [] };
                    groups[uid].msgs.push(m);
                });

                chatFeed.innerHTML = "";
                Object.keys(groups).forEach(uid => {
                    const g = groups[uid];
                    chatFeed.innerHTML += `
                        <div class="chat-card">
                            <div style="padding:8px; background:#e2e8f0; font-weight:bold;">CLIENT: ${g.name}</div>
                            <div class="chat-history" id="box-${uid}">
                                ${g.msgs.map(m => `<div class="msg ${m.sender === 'ADMIN' ? 'admin' : 'user'}">
                                    ${m.message}<br><small style="font-size:8px; opacity:0.6;">${m.timestamp?.toDate().toLocaleString() || ''}</small>
                                </div>`).join('')}
                            </div>
                            <div class="reply-box">
                                <input type="text" id="in-${uid}" placeholder="Reply...">
                                <button onclick="window.reply('${uid}', '${g.name}')" style="background:#10b981; color:white; border:none; padding:8px; border-radius:5px;">SEND</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.reply = async (uid, name) => {
            const input = document.getElementById(`in-${uid}`);
            if(!input.value) return;
            await addDoc(collection(db, "support_tickets"), {
                userId: uid, userName: name, message: input.value, sender: "ADMIN", timestamp: serverTimestamp()
            });
            input.value = "";
        };
    </script>
</body>
</html>
