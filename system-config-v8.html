<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA MASTER | V8.12 ULTIMATE</title>
    <style>
        :root { --admin-red: #ff3b30; --admin-blue: #007aff; --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; }
        body { background: var(--bg); color: #f8fafc; font-family: -apple-system, system-ui, sans-serif; margin: 0; font-size: 13px; }
        
        /* Speed Loading Spinner */
        #loader { position: fixed; top:0; left:0; width:100%; height:3px; background: var(--accent); z-index: 1000; display: none; }

        .sticky-header { position: sticky; top: 0; z-index: 100; background: var(--card); border-bottom: 2px solid var(--admin-red); }
        .stats-bar { display: flex; justify-content: space-around; background: #000; padding: 5px; font-size: 10px; color: var(--accent); font-weight: bold; }

        .tab-bar { display: flex; border-top: 1px solid #334155; }
        .tab-item { flex: 1; padding: 14px; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; color: #94a3b8; position: relative; }
        .tab-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: rgba(56, 189, 248, 0.05); }
        
        .nav-badge { position: absolute; top: 5px; right: 15%; background: var(--admin-red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 900; }

        .view-section { display: none; padding: 10px; max-width: 600px; margin: 0 auto; animation: slideIn 0.2s ease-out; }
        .view-section.active { display: block; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; outline: none; }
        .search-box:focus { border-color: var(--accent); }

        /* Request Cards */
        .req-item { background: #fff; color: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid #f59e0b; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .kyc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .img-thumb { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .img-thumb:hover { opacity: 0.8; }

        /* Professional Rows */
        .data-row { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .need-reply { border-left: 4px solid var(--admin-red); background: rgba(255, 59, 48, 0.08); }
        .reply-tag { background: var(--admin-red); color: white; font-size: 8px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }

        .chat-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; line-height: 1.4; position: relative; }
        .msg.admin { align-self: flex-end; background: var(--admin-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.user { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 2px; }

        .btn { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-green { background: #10b981; color: white; }
        .btn-gray { background: #64748b; color: white; }
        .btn-math { background: var(--accent); color: #0f172a; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <div class="sticky-header">
        <div class="stats-bar">
            <span>TOTAL USERS: <span id="stat-u">0</span></span>
            <span>VAULT: <span id="stat-v">$0</span></span>
        </div>
        <div style="padding: 12px; text-align: center;">
            <b style="letter-spacing: 1px; font-size: 15px;">COMMAND V8.12 PRO</b>
        </div>
        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab('tasks')">TASKS <span id="taskCount" class="nav-badge" style="display:none">0</span></div>
            <div class="tab-item" onclick="switchTab('users')">CLIENTS</div>
            <div class="tab-item" onclick="switchTab('chats')">CHATS <span id="chatBadge" class="nav-badge" style="display:none">0</span></div>
        </div>
    </div>

    <div id="section-tasks" class="view-section active">
        <div id="requestFeed"></div>
    </div>

    <div id="section-users" class="view-section">
        <input type="text" id="userSearch" class="search-box" placeholder="Search by name or email..." onkeyup="doSearch()">
        <div id="userList"></div>
    </div>

    <div id="section-chats" class="view-section">
        <div id="chatList"></div>
    </div>

    <div id="chatOverlay" class="chat-overlay">
        <div style="background:var(--card); padding:15px; display:flex; justify-content: space-between; align-items: center; border-bottom:1px solid #334155;">
            <div>
                <b id="activeChatUser" style="font-size: 16px;">User</b><br>
                <small style="color: var(--accent)">Online Support</small>
            </div>
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
        </div>
        <div class="chat-body" id="chatStream"></div>
        <div style="padding:15px; display:flex; gap:10px; background:var(--card); border-top: 1px solid #334155;">
            <input type="text" id="chatInput" style="flex:1; padding:12px; border-radius:25px; border:1px solid #334155; background:#0f172a; color:white; outline:none;" placeholder="Write a message...">
            <button onclick="sendReply()" class="btn btn-green" style="border-radius: 25px; padding: 0 20px;">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, onSnapshot, query, orderBy, doc, updateDoc, getDoc, addDoc, serverTimestamp, where, limit } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // SPEED FEATURE: Offline Persistence
        const db = initializeFirestore(app, {
            localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
        });

        let activeUID = null, activeName = null, allUsers = [];

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "liger4683@gmail.com") { initApp(); } 
            else { window.location.href = "index.html"; }
        });

        function showLoader(show) { document.getElementById('loader').style.display = show ? 'block' : 'none'; }

        function initApp() {
            showLoader(true);

            // SYNC USERS & STATS
            onSnapshot(collection(db, "users"), (snap) => {
                allUsers = [];
                let totalV = 0;
                const list = document.getElementById('userList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data(); u.id = d.id;
                    allUsers.push(u);
                    totalV += parseFloat(u.balance || 0);
                    renderUserCard(u, list);
                });
                document.getElementById('stat-u').innerText = snap.size;
                document.getElementById('stat-v').innerText = "$" + totalV.toLocaleString();
                showLoader(false);
            });

            // SYNC PENDING TASKS
            const taskQuery = query(collection(db, "requests"), where("status", "==", "PENDING"), orderBy("timestamp", "desc"));
            onSnapshot(taskQuery, (snap) => {
                const feed = document.getElementById('requestFeed');
                const badge = document.getElementById('taskCount');
                feed.innerHTML = snap.empty ? '<p style="text-align:center; color:#64748b; margin-top:50px;">No Pending Tasks</p>' : "";
                
                badge.style.display = snap.size > 0 ? "block" : "none";
                badge.innerText = snap.size;

                snap.forEach(d => {
                    const r = d.data();
                    feed.innerHTML += `<div class="req-item">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <small>${r.userName || 'Client'}</small>
                            <span style="font-size:10px; color:#f59e0b; font-weight:bold;">${r.type}</span>
                        </div>
                        <h2 style="margin:8px 0;">$${parseFloat(r.amount).toLocaleString()}</h2>
                        <div style="font-size:11px; background:#f8fafc; padding:8px; border-radius:6px; margin-bottom:10px;">${r.details || r.note || 'No description provided.'}</div>
                        <div class="kyc-row">
                            ${r.frontImg ? `<img src="${r.frontImg}" class="img-thumb" onclick="window.open(this.src)">` : ''}
                            ${r.backImg ? `<img src="${r.backImg}" class="img-thumb" onclick="window.open(this.src)">` : ''}
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="window.processTask('${d.id}', '${r.userId}', 'APPROVE', '${r.type}', ${r.amount})" class="btn btn-green" style="flex:1">APPROVE</button>
                            <button onclick="window.processTask('${d.id}', '${r.userId}', 'REJECT', '${r.type}', ${r.amount})" class="btn btn-gray" style="flex:1">REJECT</button>
                        </div>
                    </div>`;
                });
            });

            // SYNC CHATS
            onSnapshot(query(collection(db, "support_tickets"), orderBy("timestamp", "asc")), (snap) => {
                const groups = {};
                snap.forEach(s => {
                    const m = s.data();
                    if(!groups[m.userId]) groups[m.userId] = { name: m.userName, msgs: [] };
                    groups[m.userId].msgs.push(m);
                });

                const chatList = document.getElementById('chatList');
                const badge = document.getElementById('chatBadge');
                chatList.innerHTML = "";
                let unreplied = 0;

                Object.keys(groups).forEach(uid => {
                    const g = groups[uid];
                    const last = g.msgs[g.msgs.length - 1];
                    const waiting = last.sender !== "ADMIN";
                    if(waiting) unreplied++;

                    const div = document.createElement('div');
                    div.className = `data-row ${waiting ? 'need-reply' : ''}`;
                    div.innerHTML = `<div><b>${g.name}</b><br><small style="color:#94a3b8">${last.message.substring(0,30)}...</small></div>
                                     ${waiting ? '<span class="reply-tag">REPLY NEEDED</span>' : '<span>→</span>'}`;
                    div.onclick = () => openChat(uid, g.name, g.msgs);
                    chatList.appendChild(div);
                    if(activeUID === uid) renderMessages(g.msgs);
                });

                badge.innerText = unreplied;
                badge.style.display = unreplied > 0 ? "block" : "none";
            });
        }

        function renderUserCard(u, container) {
            const div = document.createElement('div');
            div.className = 'data-row';
            div.innerHTML = `<div><b>${u.fullName}</b><br><small style="color:#10b981">$${parseFloat(u.balance || 0).toLocaleString()}</small></div>
                             <button onclick="window.doMath('${u.id}')" class="btn-math">±</button>`;
            container.appendChild(div);
        }

        window.doSearch = () => {
            const val = document.getElementById('userSearch').value.toLowerCase();
            const list = document.getElementById('userList');
            list.innerHTML = "";
            allUsers.filter(u => u.fullName.toLowerCase().includes(val) || u.email?.toLowerCase().includes(val))
                    .forEach(u => renderUserCard(u, list));
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-item, .view-section').forEach(el => el.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`section-${tab}`).classList.add('active');
        };

        function openChat(uid, name, msgs) {
            activeUID = uid; activeName = name;
            document.getElementById('activeChatUser').innerText = name;
            document.getElementById('chatOverlay').style.display = "flex";
            renderMessages(msgs);
        }

        window.closeChat = () => { activeUID = null; document.getElementById('chatOverlay').style.display = "none"; };

        function renderMessages(msgs) {
            const box = document.getElementById('chatStream');
            box.innerHTML = msgs.map(m => `<div class="msg ${m.sender==='ADMIN'?'admin':'user'}">${m.message}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        window.sendReply = async () => {
            const input = document.getElementById('chatInput');
            if(!input.value || !activeUID) return;
            const msg = input.value;
            input.value = "";
            await addDoc(collection(db, "support_tickets"), {
                userId: activeUID, userName: activeName, message: msg, sender: "ADMIN", timestamp: serverTimestamp()
            });
        };

        window.processTask = async (did, uid, action, type, amt) => {
            showLoader(true);
            try {
                const uRef = doc(db, "users", uid);
                const rRef = doc(db, "requests", did);
                const uSnap = await getDoc(uRef);
                const curBal = parseFloat(uSnap.data().balance || 0);

                if(action === 'APPROVE') {
                    if(type.includes("GRANT")) await updateDoc(uRef, { balance: curBal + amt });
                    if(type.includes("KYC")) await updateDoc(uRef, { kycStatus: "APPROVED" });
                    await updateDoc(rRef, { status: "SUCCESSFUL" });
                } else {
                    if(type.includes("WITHDRAW") || type.includes("TRANSFER")) await updateDoc(uRef, { balance: curBal + amt });
                    await updateDoc(rRef, { status: "DECLINED" });
                }
            } catch (e) { alert("Error processing task"); }
            showLoader(false);
        };

        window.doMath = async (uid) => {
            const val = prompt("Enter amount to add (use minus - to subtract):", "0");
            if(val) {
                showLoader(true);
                const uRef = doc(db, "users", uid);
                const uSnap = await getDoc(uRef);
                const cur = parseFloat(uSnap.data().balance || 0);
                await updateDoc(uRef, { balance: cur + parseFloat(val) });
                showLoader(false);
            }
        };
    </script>
</body>
</html>
