<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA MASTER | V8.5 FINAL PRO</title>
    <style>
        :root { --admin-red: #ba0c2f; --admin-blue: #00274c; --bg: #0f172a; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; font-size: 13px; padding-bottom: 50px; }
        .admin-nav { background: #1e293b; padding: 12px; border-bottom: 2px solid var(--admin-red); text-align: center; position: sticky; top:0; z-index:100; }
        .stats-wrapper { display: flex; gap: 8px; padding: 10px; overflow-x: auto; background: var(--bg); }
        .stat-card { flex: 1; background: #334155; padding: 10px; border-radius: 8px; text-align: center; min-width: 100px; border: 1px solid #475569; }
        .stat-card p { margin: 4px 0 0; font-size: 16px; font-weight: bold; color: #38bdf8; }
        .container { padding: 8px; max-width: 600px; margin: 0 auto; }
        .section-title { font-size: 11px; color: #38bdf8; text-transform: uppercase; margin: 20px 0 10px; font-weight: bold; border-left: 3px solid #38bdf8; padding-left: 8px; }
        
        /* Users List */
        .user-card { background: #1e293b; padding: 12px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 8px; }
        .user-main { display: flex; justify-content: space-between; align-items: center; }
        .bal { color: #10b981; font-weight: bold; font-size: 15px; }
        .math-btn { background: #38bdf8; color: #0f172a; border: none; width: 45px; height: 35px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Requests */
        .req-item { background: #fff; color: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 6px solid #f59e0b; }
        .action-btn { padding: 10px; border-radius: 6px; font-weight: 800; border: none; cursor: pointer; flex: 1; }
        .btn-appr { background: #10b981; color: white; }
        .btn-rej { background: #ef4444; color: white; }

        /* Chats */
        .chat-card { background: #fff; color: #1e293b; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .chat-history { height: 200px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #f1f5f9; }
        .msg { max-width: 85%; padding: 8px; border-radius: 10px; font-size: 12px; }
        .msg.admin { align-self: flex-end; background: var(--admin-blue); color: white; }
        .msg.user { align-self: flex-start; background: #e2e8f0; }
        .reply-box { padding: 10px; display: flex; gap: 8px; background: #fff; border-top: 1px solid #ddd; }
        .reply-box input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="admin-nav">
        <b>SBA COMMAND PRO V8.5</b><br>
        <span id="adminEmail" style="font-size: 10px; color: #38bdf8;">AUTHENTICATING...</span>
    </div>

    <div class="stats-wrapper">
        <div class="stat-card"><h3>Clients</h3><p id="stat-users">0</p></div>
        <div class="stat-card"><h3>Pending</h3><p id="stat-reqs">0</p></div>
        <div class="stat-card"><h3>Total $</h3><p id="stat-cash">$0</p></div>
    </div>

    <div class="container">
        <div class="section-title">⚡ ACTION REQUIRED</div>
        <div id="requestFeed"></div>

        <div class="section-title">💬 LIVE CHATS</div>
        <div id="chatFeed"></div>

        <div class="section-title">👤 DIRECTORY</div>
        <div id="userList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "liger4683@gmail.com") {
                document.getElementById('adminEmail').innerText = "ADMIN: " + user.email.toUpperCase();
                startSystem();
            } else { window.location.href = "index.html"; }
        });

        function startSystem() {
            // USERS & BALANCES
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('userList');
                let totalVault = 0; list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    let bal = parseFloat(u.balance) || 0;
                    totalVault += bal;
                    list.innerHTML += `
                        <div class="user-card">
                            <div class="user-main">
                                <div><b>${u.fullName || u.email || 'User'}</b><div class="bal">$${bal.toLocaleString()}</div></div>
                                <button class="math-btn" onclick="window.editBal('${d.id}')">EDIT</button>
                            </div>
                        </div>`;
                });
                document.getElementById('stat-users').innerText = snap.size;
                document.getElementById('stat-cash').innerText = "$" + totalVault.toLocaleString();
            });

            // PENDING TASKS
            onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snap) => {
                const feed = document.getElementById('requestFeed');
                let pCount = 0; feed.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    if(r.status !== "PENDING") return;
                    pCount++;
                    feed.innerHTML += `
                        <div class="req-item">
                            <small>${r.userEmail}</small>
                            <div style="font-weight:bold; color:#00274c;">${r.type}</div>
                            <h2>$${parseFloat(r.amount || 0).toLocaleString()}</h2>
                            <div style="display:flex; gap:8px;">
                                <button onclick="window.handle('${d.id}', '${r.userId}', 'APPROVE', '${r.type}', ${r.amount})" class="action-btn btn-appr">APPROVE</button>
                                <button onclick="window.handle('${d.id}', '${r.userId}', 'REJECT', '${r.type}', ${r.amount})" class="action-btn btn-rej">DECLINE</button>
                            </div>
                        </div>`;
                });
                document.getElementById('stat-reqs').innerText = pCount;
            });

            // CHATS - Grouped by User
            onSnapshot(query(collection(db, "support_tickets"), orderBy("timestamp", "asc")), (snap) => {
                const chatFeed = document.getElementById('chatFeed');
                const chats = {};
                snap.forEach(s => {
                    const m = s.data();
                    if (!chats[m.userId]) chats[m.userId] = { name: m.userName || m.userEmail || 'Client', msgs: [] };
                    chats[m.userId].msgs.push(m);
                });
                chatFeed.innerHTML = "";
                Object.keys(chats).forEach(uid => {
                    const c = chats[uid];
                    chatFeed.innerHTML += `
                        <div class="chat-card">
                            <div style="padding:8px; background:#e2e8f0; font-weight:bold;">${c.name}</div>
                            <div class="chat-history" id="chatbox-${uid}">${c.msgs.map(m => `<div class="msg ${m.sender === 'ADMIN' ? 'admin' : 'user'}">${m.message}</div>`).join('')}</div>
                            <div class="reply-box">
                                <input type="text" id="input-${uid}" placeholder="Type reply...">
                                <button onclick="window.sendMsg('${uid}', '${c.name}')" class="action-btn btn-appr" style="flex:0; padding:8px 15px;">SEND</button>
                            </div>
                        </div>`;
                    setTimeout(() => { const b = document.getElementById(`chatbox-${uid}`); b.scrollTop = b.scrollHeight; }, 100);
                });
            });
        }

        window.editBal = async (uid) => {
            const val = prompt("Enter amount to add (e.g. 500) or subtract (e.g. -500):");
            if(!val || isNaN(val)) return;
            const ref = doc(db, "users", uid);
            const s = await getDoc(ref);
            const newB = (parseFloat(s.data().balance) || 0) + parseFloat(val);
            await updateDoc(ref, { balance: newB });
        };

        window.handle = async (did, uid, action, type, amt) => {
            const rRef = doc(db, "requests", did);
            const uRef = doc(db, "users", uid);
            if(action === 'APPROVE') {
                if(type.includes("KYC")) await updateDoc(uRef, { kycStatus: "APPROVED" });
                await updateDoc(rRef, { status: "SUCCESSFUL" });
            } else {
                await updateDoc(rRef, { status: "REJECTED" });
            }
            alert("Action Processed.");
        };

        window.sendMsg = async (uid, name) => {
            const inp = document.getElementById(`input-${uid}`);
            if(!inp.value) return;
            await addDoc(collection(db, "support_tickets"), {
                userId: uid, userName: name, message: inp.value, sender: "ADMIN", timestamp: serverTimestamp()
            });
            inp.value = "";
        };
    </script>
</body>
</html>
